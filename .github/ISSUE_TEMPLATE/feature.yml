name: Feature request
description: Suggest a new capability or a meaningful change to an existing one.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the *use case* before the *implementation*. "I want X so that Y" lands better than a pre-baked design.
        Check [`docs/ROADMAP.md`](../../docs/ROADMAP.md) first — your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: e.g. "I run a 30-person community server and have no way to identify who's been muted by an admin vs muted themselves."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketches and rough APIs welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.

  - type: dropdown
    id: component
    attributes:
      label: Primary component
      options:
        - aura-server
        - aura-core
        - aura-protocol
        - macOS client
        - Desktop (.NET) client
        - Docs / build / CI
        - Cross-cutting / not sure
    validations:
      required: true
