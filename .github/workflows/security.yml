name: Security audit

on:
  schedule:
    # Mondays 06:17 UTC — odd minute to spread load off the hour.
    - cron: '17 6 * * 1'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      # rustsec/audit-check opens / updates an issue per advisory found.
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny (advisories, bans, sources)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
        with:
          command: check advisories bans sources
