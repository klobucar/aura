syntax = "proto3";

package aura.signaling;

// --- MLS Protocol Wrapper Messages ---
// These map to the DAVE Protocol / MLS RFC requirements for signaling.

message MlsMessage {
    uint32 group_id = 1;
    uint64 epoch = 2; // The epoch this message is targeting
    
    // Group type determines epoch advancement rules:
    // VOICE (0): Low churn, epoch advances on join/leave only
    // TEXT (1):  High churn, epoch can advance per message batch
    uint32 group_type = 7; // 0 = VOICE, 1 = TEXT
    
    oneof content {
        bytes proposal = 3;  // MLS Proposal (Add, Remove, Update)
        bytes commit = 4;    // MLS Commit (Key rotation / epoch increment)
        bytes welcome = 5;   // MLS Welcome info for new members
        bytes key_package = 6; // Initial KeyPackage for a client
    }
}


// Sent by the server when it detects a drop
message MemberDisconnected {
    uint32 session_id = 1;
    uint32 group_id = 2;
}

// Generic RPC response for signaling actions
message SignalResponse {
    bool success = 1;
    string error_message = 2; // e.g., "Error::StaleEpoch"
    uint32 current_epoch = 3; // Latest server epoch
}
